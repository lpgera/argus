version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 1
    groups:
      serialport:
        patterns:
          - 'serialport'
          - '@serialport/*'
      mui:
        patterns:
          - '@mui/*'
      aws:
        patterns:
          - '@aws-sdk/*'
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 1
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 1
